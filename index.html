<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFC 2.0 — Premium Marketplace</title>
    <style>
        :root {
            --ozon-blue: #005bff;
            --ozon-magenta: #f91155;
            --text-main: #2d2d2f;
            --card-bg: rgba(255, 255, 255, 0.98);
            --input-bg: #ffffff;
            --border: #e0e0e6;
        }

        /* Темная тема */
        body.dark-mode {
            --text-main: #ffffff;
            --card-bg: rgba(30, 30, 32, 0.98);
            --input-bg: #2d2d2f;
            --border: #444;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(-45deg, #f2f5f9, #eef3ff, #fff0f5, #f0fff4);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-main);
            display: flex; 
            justify-content: center; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            transition: background 0.5s ease;
        }

        body.dark-mode {
            background: #121212;
            animation: none;
        }

        .container { 
            background: var(--card-bg); 
            padding: 24px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 450px; 
            backdrop-filter: blur(10px);
            align-self: flex-start;
            transition: 0.3s;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        h2 { color: var(--ozon-blue); margin: 0; font-weight: 800; }

        .controls { display: flex; gap: 10px; }

        .icon-btn {
            cursor: pointer;
            font-size: 20px;
            background: var(--input-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
        }

        /* КАРТОЧКИ */
        .products-grid { display: grid; gap: 12px; margin-bottom: 20px; }
        .product-card {
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
        }

        input, select { 
            width: 100%; padding: 14px; margin-bottom: 12px; 
            border: 2px solid var(--border); border-radius: 12px; 
            font-size: 16px; background: var(--input-bg); color: var(--text-main);
            box-sizing: border-box;
        }

        button { 
            width: 100%; padding: 14px; border: none; border-radius: 12px; 
            font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.2s; 
        }

        .btn-add { background: var(--ozon-blue); color: white; }
        .btn-pay { background: var(--ozon-magenta); color: white; margin-top: 10px; }
        .btn-secondary { background: #eef3ff; color: var(--ozon-blue); margin-top: 10px; }
        body.dark-mode .btn-secondary { background: #333; color: #fff; }

        .hidden { display: none; }
        .active-section { animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .cart-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--border); font-size: 14px; }
        .address-block { background: rgba(0, 91, 255, 0.05); padding: 16px; border-radius: 12px; margin: 15px 0; border-left: 4px solid var(--ozon-blue); font-size: 14px; }

        .total-val { font-size: 24px; font-weight: 800; color: var(--ozon-magenta); }
        .promo-active { color: #00aa00; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h2>KFC 2.0</h2>
        <div class="controls">
            <div class="icon-btn" onclick="toggleTheme()" title="Сменить тему">🌗</div>
            <div id="cart-btn" class="icon-btn hidden" onclick="openCart()">🛒 <span id="cart-badge">0</span></div>
        </div>
    </div>

    <div id="auth-section">
        <input type="text" id="username" placeholder="Логин">
        <input type="text" id="nickname" placeholder="Имя">
        <button class="btn-add" onclick="login()">Войти</button>
    </div>

    <div id="menu-section" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <span>Привет, <b id="display-nick"></b>!</span>
            <button onclick="showSection('promo-section')" style="width: auto; padding: 5px 10px; font-size: 12px;" class="btn-secondary">🎟 Промокод</button>
        </div>
        
        <div class="products-grid">
            <div class="product-card">
                <span style="font-weight:700">🥪 Бутерброд с колбасой</span>
                <div style="color:var(--ozon-blue); font-weight:800; margin: 8px 0;">35 ₽</div>
                <button class="btn-add" onclick="addToCart(35, 'Бутерброд с колбасой', 1)">В корзину</button>
            </div>
            <div class="product-card">
                <span style="font-weight:700">🧀 Бутерброд с сыром</span>
                <div style="color:var(--ozon-blue); font-weight:800; margin: 8px 0;">35 ₽</div>
                <button class="btn-add" onclick="addToCart(35, 'Бутерброд с сыром', 2)">В корзину</button>
            </div>
            <div class="product-card">
                <span style="font-weight:700">🍔 Бургер Комбо</span>
                <div style="color:var(--ozon-blue); font-weight:800; margin: 8px 0;">60 ₽</div>
                <button class="btn-add" onclick="addToCart(60, 'Бургер Комбо', 3)">В корзину</button>
            </div>
        </div>
        <button class="btn-pay" onclick="openCart()">Оформить заказ</button>
        <button class="btn-secondary" onclick="logout()">Выйти</button>
    </div>

    <div id="promo-section" class="hidden">
        <h3>Активация промокода</h3>
        <input type="text" id="promo-input" placeholder="Введите код (например: 25)">
        <button class="btn-add" onclick="applyPromo()">Применить</button>
        <button class="btn-secondary" onclick="showSection('menu-section')">Назад</button>
        <p id="promo-msg" style="text-align: center; font-size: 14px;"></p>
    </div>

    <div id="cart-section" class="hidden">
        <h3>Корзина</h3>
        <div id="cart-list" style="background: rgba(128,128,128,0.05); padding: 10px; border-radius: 12px;"></div>
        
        <select id="delivery-method" onchange="updateTotal()" style="margin-top: 15px;">
            <option value="pickup">Самовывоз (0 ₽)</option>
            <option value="delivery">Доставка (+25 ₽)</option>
        </select>

        <div id="address-info" class="address-block"></div>

        <div class="total-line">
            <div>
                <span style="font-weight: 700;">Итого:</span><br>
                <span id="discount-label" class="promo-active hidden">Скидка -25% активна!</span>
            </div>
            <span id="final-price" class="total-val">0 ₽</span>
        </div>

        <button class="btn-pay" onclick="payOrder()">Оплатить</button>
        <button class="btn-secondary" onclick="showSection('menu-section')">Вернуться</button>
    </div>
</div>

<script>
    let cart = [];
    let discount = 1; // 1 = без скидки, 0.75 = -25%

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    function login() {
        const u = document.getElementById('username').value;
        const n = document.getElementById('nickname').value;
        if (u && n) {
            document.getElementById('display-nick').innerText = n;
            document.getElementById('cart-btn').classList.remove('hidden');
            showSection('menu-section');
        }
    }

    function logout() { location.reload(); }

    function addToCart(price, name, id) {
        cart.push({ price, name, id });
        document.getElementById('cart-badge').innerText = cart.length;
        alert("Добавлено: " + name);
    }

    function applyPromo() {
        const code = document.getElementById('promo-input').value;
        const msg = document.getElementById('promo-msg');
        if (code === '25') {
            discount = 0.75;
            msg.style.color = "#00aa00";
            msg.innerText = "Промокод применен! Скидка 25% ваша.";
            document.getElementById('discount-label').classList.remove('hidden');
        } else {
            msg.style.color = "red";
            msg.innerText = "Неверный промокод.";
        }
    }

    function openCart() {
        if (cart.length === 0) return alert("Корзина пуста!");
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        cart.forEach(item => {
            list.innerHTML += `<div class="cart-item"><span>${item.name}</span><b>${item.price} ₽</b></div>`;
        });
        updateTotal();
        showSection('cart-section');
    }

    function updateTotal() {
        const isDelivery = document.getElementById('delivery-method').value === 'delivery';
        let total = cart.reduce((s, i) => s + i.price, 0);
        if (isDelivery) {
            total += 25;
            document.getElementById('address-info').innerHTML = "г. Квартирск, ул. Папина, 1 b";
        } else {
            document.getElementById('address-info').innerHTML = "г. Квартирск, ул. Домовая, 67/2";
        }
        
        let final = Math.round(total * discount);
        document.getElementById('final-price').innerText = final + " ₽";
        return final;
    }

    function payOrder() {
        const total = updateTotal();
        const ids = cart.map(i => i.id).join(', ');
        alert(`Сумма: ${total} ₽\nТ-Банк: 8 961 529 63 89\nКод для Telegram @roman_egoroff:\nid{${ids}}`);
        cart = []; document.getElementById('cart-badge').innerText = "0";
        showSection('menu-section');
    }

    function showSection(id) {
        ['auth-section', 'menu-section', 'cart-section', 'promo-section'].forEach(s => document.getElementById(s).classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
        document.getElementById(id).classList.add('active-section');
    }
</script>

</body>
</html>
